name: Go

on:
  push:
    branches: ["new_workflow"]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v3
    - uses: actions/setup-go@v4   # uses - выполняет указанное действие. Тут actions - аккаунт разработчика действия, setup-go - название действия, @v4 - версия
      with:                       # with - параметры для действия
        go-version: '1.20'

    - name: Build
      run: go build -v ./...

  tests:
    # Задание "tests" зависит от задания "build" и будет выполнено после него
    needs: build
    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v3
    - uses: actions/setup-go@v4   # uses - выполняет указанное действие. Тут actions - аккаунт разработчика действия, setup-go - название действия, @v4 - версия
      with:                       # with - параметры для действия
        go-version: '1.20'

    - name: Test
      run: go test -v ./...
