name: Go

on:
  push:
    branches: ["main"]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v3
    - uses: actions/setup-go@v4   # uses - выполняет указанное действие. Тут actions - аккаунт разработчика действия, setup-go - название действия, @v4 - версия
      with:                       # with - параметры для действия
        go-version: '1.25.0'

    - name: Build
      run: go build -v ./...

  tests:
    # Задание "tests" зависит от задания "build" и будет выполнено после него
    needs: build
    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v3
    - uses: actions/setup-go@v4   # uses - выполняет указанное действие. Тут actions - аккаунт разработчика действия, setup-go - название действия, @v4 - версия
      with:                       # with - параметры для действия
        go-version: '1.25.0'

    - name: Test
      run: go test -v ./...

  # Задание проверяет наличие в коде состояния гонки
  tests-race:
    # Задание "tests-race" зависит от задания "build" и будет выполнено после него
    needs: build
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-go@v4   # uses - выполняет указанное действие. Тут actions - аккаунт разработчика действия, setup-go - название действия, @v4 - версия
      with:                       # with - параметры для действия
        go-version: '1.25.0'

    - name: Test
      run: go test -race -v ./...
  
  # Задание проверяет код на соответствие стилю и отсутствие логических ошибок
  lint:
    # Задание "lint" зависит от заданий "tests" и "tests-race" и будет выполнено после них
    needs: [tests, tests-race]
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-go@v4 
        with: 
          go-version: '1.25.0'     
      - uses: golangci/golangci-lint-action@v3
        with:
          version: latest
